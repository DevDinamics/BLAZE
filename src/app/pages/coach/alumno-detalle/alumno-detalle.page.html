<ion-content [fullscreen]="true" style="--background: #000;">
  <div class="min-h-full bg-black px-6 pt-6 pb-20 font-sans">

    <div class="flex items-center gap-4 mb-8">
      <button (click)="regresar()" class="h-10 w-10 rounded-full border border-gray-800 flex items-center justify-center text-white hover:text-[#ffa500]">
        <ion-icon name="arrow-back" class="text-xl"></ion-icon>
      </button>
      <div class="flex items-center gap-3">
        <img [src]="alumno.foto" class="h-12 w-12 rounded-full border border-gray-700">
        <div>
          <h1 class="text-white font-bold text-lg uppercase leading-none">{{ alumno.nombre }}</h1>
          <p class="text-gray-500 text-xs mt-1">{{ alumno.objetivo }}</p>
        </div>
      </div>
    </div>

    <div class="space-y-4">
      
      <div class="bg-[#111] rounded-xl p-4 border border-gray-800 flex justify-between items-center">
        <div>
          <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Rutina Actual</p>
          <h3 class="text-white font-bold text-sm">{{ alumno.rutina }}</h3>
        </div>
        <ion-icon name="fitness" class="text-[#ffa500] text-xl"></ion-icon>
      </div>

      <div *ngIf="alumno.dieta" class="bg-[#111] rounded-xl p-4 border border-green-500/30 flex justify-between items-center relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-green-500"></div>
        <div>
          <p class="text-[10px] text-green-500 font-bold uppercase mb-1">Plan Nutricional</p>
          <h3 class="text-white font-bold text-sm">{{ alumno.dieta }}</h3>
        </div>
        <button (click)="asignarDieta()" class="text-xs text-gray-400 underline">Cambiar</button>
      </div>

      <div *ngIf="!alumno.dieta" class="bg-[#111] rounded-xl p-6 border border-dashed border-gray-700 text-center">
        <p class="text-gray-500 text-xs mb-3">Este alumno no tiene plan de alimentación.</p>
        <button (click)="asignarDieta()" class="w-full bg-[#ffa500] text-black font-bold py-3 rounded-xl uppercase text-xs flex items-center justify-center gap-2 hover:bg-[#ffb700] active:scale-95 transition-all">
          <ion-icon name="add-circle" class="text-lg"></ion-icon>
          Asignar Dieta
        </button>
      </div>

    </div>

  </div>
</ion-content>
