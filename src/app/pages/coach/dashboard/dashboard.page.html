<ion-content [fullscreen]="true" style="--background: #f9fafb;">
  <div class="min-h-full font-sans pb-20 bg-[#f9fafb]"> 
    
    <div class="pt-10 pb-6 px-6 bg-white border-b border-gray-100 shadow-sm rounded-b-3xl">
      <div class="flex justify-between items-center mb-8">
        <div>
          <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mb-1">Panel de Control</p>
          <h1 class="text-3xl font-rajdhani font-bold text-gray-900 uppercase leading-none">
            HOLA <span class="text-[#ffa500]">COACH</span>
          </h1>
        </div>
        
        <div routerLink="/coach/perfil-coach" class="relative group cursor-pointer">
          <div class="h-12 w-12 rounded-full border-2 border-white p-0.5 hover:scale-105 transition-transform active:scale-95 bg-gray-50 shadow-md overflow-hidden">
            <img [src]="coachFoto || 'https://ui-avatars.com/api/?name=Coach&background=F3F4F6&color=9CA3AF'" class="h-full w-full rounded-full object-cover">
          </div>
          <div class="absolute -bottom-1 -right-1 bg-white text-gray-700 h-6 w-6 rounded-full flex items-center justify-center border border-gray-100 shadow-sm z-10">
            <ion-icon [icon]="iconSettings" class="text-[12px]"></ion-icon>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div routerLink="/coach/mis-alumnos" class="bg-white rounded-3xl p-5 border border-gray-100 shadow-sm flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform hover:shadow-md relative overflow-hidden">
  
  <div *ngIf="tieneNuevosAlumnos" class="absolute top-3 right-3 h-2.5 w-2.5 bg-red-500 rounded-full border-2 border-white animate-pulse shadow-sm z-10"></div>
  
  <p class="text-3xl font-black text-black">{{ totalAlumnos }}</p>
  <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Alumnos</p>
</div>
        <div class="bg-orange-50 rounded-2xl p-4 border border-orange-100 text-center relative overflow-hidden">
          <div *ngIf="pendientes.length > 0" class="absolute top-2 right-2 h-1.5 w-1.5 bg-[#ffa500] rounded-full animate-pulse"></div>
          <p class="text-2xl font-rajdhani font-black text-[#ffa500]">{{ pendientes.length }}</p>
          <p class="text-[9px] text-orange-600 font-bold uppercase tracking-wider mt-0.5">Revisar</p>
        </div>
        <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 text-center">
          <p class="text-2xl font-rajdhani font-black text-gray-900">5.0</p>
          <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider mt-0.5">Rating</p>
        </div>
      </div>
    </div>

    <div class="px-6 mt-8 mb-8">
      <div class="flex items-center justify-between mb-4">
        <p class="text-gray-900 text-lg font-rajdhani font-bold uppercase tracking-tight">Gestión</p>
      </div>
      
      <div class="grid grid-cols-2 gap-3">
        
        <div routerLink="/coach/ejercicios" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all cursor-pointer active:scale-95 flex flex-col justify-between h-32">
          <div class="h-10 w-10 bg-gray-50 rounded-xl flex items-center justify-center border border-gray-100 mb-2">
            <ion-icon [icon]="iconBarbell" class="text-gray-800 text-xl"></ion-icon>
          </div>
          <div>
            <h3 class="text-gray-900 font-bold uppercase tracking-tight text-xs">Biblioteca</h3>
            <p class="text-gray-400 text-[10px] mt-0.5">Ver ejercicios</p>
          </div>
        </div>

        <div routerLink="/coach/rutinas" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all cursor-pointer active:scale-95 flex flex-col justify-between h-32">
          <div class="h-10 w-10 bg-gray-50 rounded-xl flex items-center justify-center border border-gray-100 mb-2">
            <ion-icon [icon]="iconClipboard" class="text-gray-800 text-xl"></ion-icon>
          </div>
          <div>
            <h3 class="text-gray-900 font-bold uppercase tracking-tight text-xs">Rutinas</h3>
            <p class="text-gray-400 text-[10px] mt-0.5">Crear planes</p>
          </div>
        </div>

        <div routerLink="/coach/dietas" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all cursor-pointer active:scale-95 flex flex-col justify-between h-32">
          <div class="h-10 w-10 bg-gray-50 rounded-xl flex items-center justify-center border border-gray-100 mb-2">
            <ion-icon [icon]="iconRestaurant" class="text-gray-800 text-xl"></ion-icon>
          </div>
          <div>
            <h3 class="text-gray-900 font-bold uppercase tracking-tight text-xs">Dietas</h3>
            <p class="text-gray-400 text-[10px] mt-0.5">Plantillas</p>
          </div>
        </div>

        <div routerLink="/coach/equipos" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all cursor-pointer active:scale-95 flex flex-col justify-between h-32">
          <div class="h-10 w-10 bg-gray-50 rounded-xl flex items-center justify-center border border-gray-100 mb-2">
            <ion-icon [icon]="iconKey" class="text-gray-800 text-xl"></ion-icon>
          </div>
          <div>
            <h3 class="text-gray-900 font-bold uppercase tracking-tight text-xs">Accesos</h3>
            <p class="text-gray-400 text-[10px] mt-0.5">Códigos Team</p>
          </div>
        </div>

      </div>
    </div>

    <div class="px-4">
      <div class="bg-gray-200/50 p-1 rounded-xl mb-6 mx-2">
        <ion-segment [(ngModel)]="segmentoActual" mode="ios" style="--background: transparent;">
          <ion-segment-button value="pendientes">
            <ion-label class="font-bold text-xs tracking-wide">Pendientes</ion-label>
          </ion-segment-button>
          <ion-segment-button value="ranking">
            <ion-label class="font-bold text-xs tracking-wide">Ranking</ion-label>
          </ion-segment-button>
        </ion-segment>
      </div>

      <div *ngIf="segmentoActual === 'pendientes'" class="animate-fade-in space-y-4 px-2">
        <div *ngIf="pendientes.length === 0" class="flex flex-col items-center justify-center py-12 opacity-50">
          <ion-icon [icon]="iconCheck" class="text-5xl text-gray-300 mb-3"></ion-icon>
          <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Al día</p>
        </div>

        <div *ngFor="let item of pendientes" class="bg-white rounded-3xl p-5 border transition-all relative overflow-hidden shadow-sm border-gray-100">
          <div class="flex gap-4 items-center mb-4">
            <img [src]="item.foto" class="h-12 w-12 rounded-full object-cover border border-gray-100 shadow-sm">
            <div class="flex-1">
              <h3 class="text-gray-900 font-bold text-base tracking-tight">{{ item.usuario }}</h3>
              <p class="text-gray-400 text-[10px] flex items-center gap-1 mt-0.5">
                <ion-icon [icon]="iconTime"></ion-icon> Hace {{ item.fecha }}
              </p>
            </div>
          </div>
          
          <div class="grid grid-cols-2 gap-3">
              <button (click)="rechazar(item)" class="flex items-center justify-center gap-1 rounded-xl bg-gray-100 py-3 text-xs font-bold text-gray-600 active:scale-95 transition-transform">
                <ion-icon [icon]="iconClose" class="text-lg"></ion-icon> Rechazar
              </button>
              <button (click)="autorizar(item)" class="flex items-center justify-center gap-1 rounded-xl bg-gray-900 py-3 text-xs font-bold text-white active:scale-95 transition-transform">
                <ion-icon [icon]="iconCheck" class="text-lg"></ion-icon> Aprobar
              </button>
          </div>
        </div>
      </div>

      <div *ngIf="segmentoActual === 'ranking'" class="animate-fade-in pb-10 space-y-3 px-2">
        <div *ngIf="ranking.length === 0" class="text-center py-12 opacity-50">
          <ion-icon [icon]="iconTrophy" class="text-4xl text-gray-300 mb-2"></ion-icon>
          <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Sin datos</p>
        </div>

        <div *ngFor="let user of ranking; let i = index" class="flex items-center gap-4 p-4 rounded-2xl bg-white border shadow-sm border-gray-100">
            <div class="relative">
              <img [src]="user.foto || 'https://ui-avatars.com/api/?name=' + user.nombre" class="h-12 w-12 rounded-full object-cover border-2 border-transparent">
              <div *ngIf="i===0" class="absolute -bottom-1 -right-1 bg-white rounded-full p-0.5 shadow-sm border border-gray-100">
                <ion-icon [icon]="iconFlame" class="text-[#ffa500] text-[12px] block"></ion-icon>
              </div>
            </div>
        </div>
      </div>

    </div>
  </div>
</ion-content>
