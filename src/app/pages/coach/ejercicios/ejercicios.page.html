<ion-content [fullscreen]="true" style="--background: #ffffff;">
  <div class="min-h-full bg-white font-sans pb-10">

    

    <div class="px-6 mt-2 mb-6">
      <h1 class="text-[28px] font-black tracking-tight text-black mb-1">Ejercicios</h1>
      <p class="text-gray-500 text-sm font-medium">{{ ejerciciosFiltrados.length }} ejercicios disponibles</p>
    </div>

    <div class="px-6 mb-6">
      <div class="relative">
        <ion-icon name="search-outline" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl z-10"></ion-icon>
        <input type="text" (keyup)="buscar($event)" placeholder="Buscar ejercicio..." 
               class="w-full bg-white border border-gray-200 rounded-full py-3.5 pl-12 pr-4 text-black placeholder:text-gray-400 focus:outline-none focus:border-black transition-all shadow-sm text-sm font-medium">
      </div>
    </div>

    <div class="flex gap-2 overflow-x-auto px-6 pb-3 scrollbar-hide">
      <button *ngFor="let cat of categorias"
              (click)="filtrarPorCategoria(cat)"
              class="px-4 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap active:scale-95"
              [ngClass]="categoriaSeleccionada === cat ? 'bg-black text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'">
        {{ cat }}
      </button>
    </div>

    <div class="flex gap-2 overflow-x-auto px-6 pb-6 scrollbar-hide">
      <button *ngFor="let dif of dificultades"
              (click)="filtrarPorDificultad(dif)"
              class="px-4 py-2 rounded-full text-xs font-bold transition-all whitespace-nowrap active:scale-95"
              [ngClass]="dificultadSeleccionada === dif ? 'bg-black text-white' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'">
        {{ dif }}
      </button>
    </div>

    <div class="grid grid-cols-2 gap-4 px-6">
      
      <div *ngFor="let item of ejerciciosFiltrados" 
           class="flex flex-col bg-gray-50 rounded-2xl p-4 cursor-pointer active:scale-95 transition-transform">
        
        <div class="w-full aspect-square relative mb-3 flex items-center justify-center">
          <img [src]="item.imagen" class="w-full h-full object-contain mix-blend-multiply">
        </div>

        <div class="mt-auto">
          <h3 class="text-black font-bold text-sm leading-tight mb-1 line-clamp-2">
            {{ item.nombre }}
          </h3>
          <p class="text-gray-500 text-xs font-medium">
            {{ item.musculo }}
          </p>
        </div>

      </div>

    </div>

    <div *ngIf="ejerciciosFiltrados.length === 0" class="flex flex-col items-center justify-center py-20 opacity-50">
      <ion-icon name="search-outline" class="text-4xl text-gray-400 mb-2"></ion-icon>
      <p class="text-gray-600 font-bold text-sm">No se encontraron ejercicios</p>
    </div>

  </div>
</ion-content>

<style>
  .scrollbar-hide::-webkit-scrollbar {
      display: none;
  }
  .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
  }
</style>
