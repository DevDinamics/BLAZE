<ion-content [fullscreen]="true" style="--background: #ffffff;">
  
  <div class="min-h-full bg-white flex flex-col font-sans text-gray-900">
    
    <div class="px-6 pt-14 pb-4">
      <button (click)="regresar()" class="h-10 w-10 flex items-center justify-center rounded-full active:scale-90 transition-all bg-gray-50 border border-gray-100">
        <ion-icon name="arrow-back-outline" class="text-xl text-gray-900"></ion-icon>
      </button>
    </div>

    <div class="flex-1 px-8 pt-8 pb-40">
      
      <div class="mb-12">
        <h1 class="text-4xl font-bold text-gray-900 tracking-tight leading-tight">
          Comienza tu<br>viaje hoy
        </h1>
        <p class="text-gray-500 text-sm mt-3 font-medium">Crea tu cuenta de BLAZE</p>
      </div>

      <div class="space-y-4">
        
        <div class="bg-white border border-gray-100 rounded-3xl p-5 shadow-sm flex items-center gap-4 group focus-within:border-gray-300 transition-all focus-within:bg-[#f9fafb]">
          <ion-icon name="person-outline" class="text-gray-400 group-focus-within:text-gray-900 transition-colors text-xl shrink-0"></ion-icon>
          <input [(ngModel)]="usuario.nombre" type="text" 
                 class="bg-transparent w-full text-gray-900 font-bold text-sm outline-none placeholder-gray-400"
                 placeholder="Nombre Completo">
        </div>

        <div class="bg-white border border-gray-100 rounded-3xl p-5 shadow-sm flex items-center gap-4 group focus-within:border-gray-300 transition-all focus-within:bg-[#f9fafb]">
          <ion-icon name="mail-outline" class="text-gray-400 group-focus-within:text-gray-900 transition-colors text-xl shrink-0"></ion-icon>
          <input [(ngModel)]="usuario.email" type="email" 
                 class="bg-transparent w-full text-gray-900 font-bold text-sm outline-none placeholder-gray-400"
                 placeholder="Correo electrónico">
        </div>

        <div class="bg-white border border-gray-100 rounded-3xl p-5 shadow-sm flex items-center gap-4 group focus-within:border-gray-300 transition-all focus-within:bg-[#f9fafb] relative mt-2">
          <ion-icon name="lock-closed-outline" class="text-gray-400 group-focus-within:text-gray-900 transition-colors text-xl shrink-0"></ion-icon>
          <input [(ngModel)]="usuario.password" [type]="mostrarPassword ? 'text' : 'password'"
                 class="bg-transparent w-full text-gray-900 font-bold text-sm outline-none placeholder-gray-400 pr-10"
                 placeholder="Crea una contraseña (mínimo 6)">
          
          <div class="absolute inset-y-0 right-0 flex items-center pr-5 cursor-pointer z-10" (click)="mostrarPassword = !mostrarPassword">
            <ion-icon [name]="mostrarPassword ? 'eye-off-outline' : 'eye-outline'" class="text-gray-400 hover:text-gray-900 transition-colors text-xl"></ion-icon>
          </div>
        </div>

      </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white p-6 pb-8 border-t border-gray-50 flex flex-col items-center gap-6 shadow-[0_-10px_40px_rgba(0,0,0,0.03)] z-30">
        
        <button (click)="registrar()" [disabled]="cargando"
                class="flex w-full justify-center items-center gap-2 rounded-2xl bg-gray-900 text-white font-bold py-5 text-sm active:scale-[0.98] transition-all disabled:opacity-30">
          
          <ng-container *ngIf="!cargando">
            Continuar <ion-icon name="arrow-forward-outline" class="text-lg"></ion-icon>
          </ng-container>

          <ion-spinner *ngIf="cargando" name="crescent" color="medium"></ion-spinner>
        </button>

        <p class="text-center text-xs text-gray-500 font-medium">
          ¿Ya tienes cuenta?
          <a routerLink="/login" class="font-bold text-gray-900 hover:underline cursor-pointer ml-1">
            Inicia sesión
          </a>
        </p>
    </div>

  </div>
</ion-content>
