<div class="flex flex-col h-[75vh] bg-[#000000] text-white font-sans selection:bg-[#ffa500] selection:text-black">

  <div class="px-6 pt-5 pb-2 shrink-0 bg-gradient-to-b from-black to-[#050505]">
    <div class="w-16 h-1.5 bg-gray-800 rounded-full mx-auto mb-5"></div>
    
    <div class="flex items-center justify-between">
      <div>
        <h2 class="text-2xl font-heading font-black italic uppercase tracking-tighter leading-none">
          Registrar <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#ffa500] to-orange-600">Actividad</span>
        </h2>
      </div>
      <div class="h-10 w-10 rounded-full bg-[#ffa500]/10 flex items-center justify-center border border-[#ffa500]/20 animate-pulse">
        <ion-icon name="flame" class="text-[#ffa500] text-xl"></ion-icon>
      </div>
    </div>
  </div>

  <div class="grow overflow-y-auto px-6 py-6 space-y-8">
    
    <div class="group relative">
      <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-3 block pl-1">Disciplina</label>
      <div class="relative overflow-hidden rounded-2xl bg-[#111] border border-gray-800 group-focus-within:border-[#ffa500] transition-all duration-300 shadow-lg">
        <div class="absolute right-0 top-0 h-full w-1/3 bg-gradient-to-l from-[#ffa500]/5 to-transparent pointer-events-none"></div>
        <ion-select mode="ios" placeholder="Selecciona..." 
                    class="w-full text-white font-bold text-lg px-5 py-5 relative z-10" 
                    style="--placeholder-color: #555; --placeholder-opacity: 1;">
          <ion-select-option value="pesas">🏋️‍♂️ Musculación</ion-select-option>
          <ion-select-option value="cardio">🏃‍♂️ Cardio</ion-select-option>
          <ion-select-option value="crossfit">🔥 CrossFit</ion-select-option>
        </ion-select>
        <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none">
          <ion-icon name="chevron-down" class="text-gray-500 text-xl group-focus-within:text-[#ffa500] transition-colors"></ion-icon>
        </div>
      </div>
    </div>

    <div>
      <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-3 block pl-1">Tiempo Total</label>
      
      <div class="flex items-end justify-center gap-2 border-b-2 border-gray-800 pb-2 focus-within:border-[#ffa500] transition-colors">
        
        <input type="number" placeholder="00" 
               class="bg-transparent text-6xl font-heading font-black text-white placeholder:text-gray-800 focus:outline-none text-right w-32 p-0 leading-none remove-arrow">
        
        <span class="text-sm font-bold text-gray-500 bg-[#111] px-2 py-1 rounded border border-gray-800 mb-2">MIN</span>
      </div>
      
      <p class="text-center text-xs text-gray-600 mt-2 font-medium">Introduce la duración en minutos</p>
    </div>

    <div>
      <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-3 block pl-1">Evidencia</label>
      <div class="relative overflow-hidden rounded-2xl border-2 border-dashed border-gray-800 bg-[#0a0a0a] group hover:border-[#ffa500]/50 hover:bg-[#ffa500]/5 transition-all duration-300 cursor-pointer active:scale-[0.98]">
        <div class="py-8 flex flex-col items-center justify-center text-center">
          <div class="h-14 w-14 bg-[#111] rounded-full flex items-center justify-center mb-3 border border-gray-800 group-hover:border-[#ffa500] transition-all">
            <ion-icon name="camera" class="text-2xl text-gray-400 group-hover:text-[#ffa500] transition-colors"></ion-icon>
          </div>
          <h3 class="text-white font-bold text-sm mb-1 group-hover:text-[#ffa500] transition-colors font-heading uppercase">Subir Foto</h3>
        </div>
      </div>
    </div>
    
    <div class="h-12"></div>
  </div>

  <div class="p-5 bg-black border-t border-gray-900/50 shrink-0 z-50">
    <button (click)="guardarEntreno()"
            class="group w-full relative overflow-hidden bg-[#ffa500] rounded-xl py-5 shadow-[0_0_20px_rgba(255,165,0,0.15)] active:scale-[0.98] transition-all duration-200">
      <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out skew-y-12"></div>
      <div class="relative flex items-center justify-center gap-3">
        <span class="text-black font-heading font-black text-lg tracking-wide uppercase">Confirmar Registro</span>
        <ion-icon name="arrow-forward" class="text-black text-xl group-hover:translate-x-1 transition-transform font-bold"></ion-icon>
      </div>
    </button>
  </div>

</div>
