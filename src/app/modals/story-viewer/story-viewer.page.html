<ion-content [fullscreen]="true" class="bg-black">
  
  <div class="h-full w-full relative flex items-center justify-center bg-black">
    
    <ion-spinner *ngIf="cargando" name="crescent" color="warning" class="absolute z-0"></ion-spinner>
    
    <img [src]="historia?.imgUrl" 
         (load)="imagenCargada()"
         class="max-h-full max-w-full object-contain z-10 transition-opacity duration-500"
         [class.opacity-0]="cargando"
         [class.opacity-100]="!cargando">

    <div class="absolute bottom-0 left-0 w-full h-40 bg-gradient-to-t from-black/90 to-transparent z-20"></div>
  </div>

  <div class="absolute top-0 left-0 w-full z-30 pt-4 px-2 safe-area-top">
    <div class="h-1 w-full bg-gray-700/50 rounded-full mb-3 overflow-hidden">
      <div class="h-full bg-white rounded-full animate-progress origin-left" style="animation-duration: 5s;"></div>
    </div>

    <div class="flex justify-between items-center px-2">
      <div class="flex items-center gap-3">
        <img [src]="historia?.fotoUsuario || 'assets/avatar.png'" class="h-10 w-10 rounded-full border border-gray-500">
        <div>
          <p class="text-white font-bold text-sm shadow-black drop-shadow-md">{{ historia?.nombreUsuario }}</p>
          <p class="text-gray-300 text-xs font-medium shadow-black drop-shadow-md">hace {{ tiempoTranscurrido }}</p>
        </div>
      </div>
      
      <button (click)="cerrar()" class="h-10 w-10 flex items-center justify-center text-white text-2xl drop-shadow-lg active:scale-90">
        <ion-icon name="close"></ion-icon>
      </button>
    </div>
  </div>

  <div class="absolute bottom-10 left-0 w-full z-30 px-4 flex justify-center gap-4">
    
    <button (click)="reaccionar('🔥')" class="reaction-btn bg-gray-800/80 backdrop-blur-md border border-gray-700 text-2xl p-3 rounded-full hover:scale-125 hover:bg-[#ffa500] hover:border-[#ffa500] transition-all active:scale-90 shadow-lg">
      🔥
    </button>
    <button (click)="reaccionar('💪')" class="reaction-btn bg-gray-800/80 backdrop-blur-md border border-gray-700 text-2xl p-3 rounded-full hover:scale-125 hover:bg-green-500 hover:border-green-500 transition-all active:scale-90 shadow-lg">
      💪
    </button>
    <button (click)="reaccionar('🥵')" class="reaction-btn bg-gray-800/80 backdrop-blur-md border border-gray-700 text-2xl p-3 rounded-full hover:scale-125 hover:bg-red-500 hover:border-red-500 transition-all active:scale-90 shadow-lg">
      🥵
    </button>
    <button (click)="reaccionar('💯')" class="reaction-btn bg-gray-800/80 backdrop-blur-md border border-gray-700 text-2xl p-3 rounded-full hover:scale-125 hover:bg-yellow-400 hover:border-yellow-400 transition-all active:scale-90 shadow-lg">
      💯
    </button>

  </div>

  <div *ngIf="reaccionAnimada" class="absolute bottom-24 left-1/2 -translate-x-1/2 z-40 text-6xl animate-float-up pointer-events-none">
    {{ reaccionAnimada }}
  </div>

</ion-content>
